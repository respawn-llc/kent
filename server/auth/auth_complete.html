  color-scheme: dark;
  --bg: #0b0f14;
  --fg: #d6deeb;

  --primary: #7dd3fc;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  display: grid;

  color: var(--fg);

}

  margin: 0 0 24px;
  color: var(--primary);
  font-size: clamp(42px, 8vw, 82px);
  line-height: 1;
  letter-spacing: -0.04em;
}

  margin: 0;
  color: var(--muted);
  font-size: 16px;
}
