name: release

on:
  workflow_dispatch:
  pull_request:
    types:
      - closed

jobs:
  prepare_release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'autorelease')) }}
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      version_bumped: ${{ steps.version.outputs.version_bumped }}
      changelog: ${{ steps.changelog.outputs.changelog }}
      artifact_name: ${{ steps.artifact.outputs.name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref || github.ref_name }}
          token: ${{ secrets.OPENSOURCE_PAT || github.token }}

      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Read version
        id: version
        env:
          GH_TOKEN: ${{ secrets.OPENSOURCE_PAT || github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          version="$(tr -d ' \n' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          version="${version#v}"
          if ! [[ "$version" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "VERSION must be a semantic version in X.Y.Z form, got: $version" >&2
            exit 1
          fi
          major="${BASH_REMATCH[1]}"
          minor="${BASH_REMATCH[2]}"
          patch="${BASH_REMATCH[3]}"
          tag="v${version}"

          version_bumped="false"
          while true; do
            draft_state="$(gh api "repos/${REPOSITORY}/releases/tags/${tag}" --jq '.draft' 2>/dev/null || echo missing)"
            if [ "$draft_state" != "false" ]; then
              break
            fi
            patch="$((patch + 1))"
            version="${major}.${minor}.${patch}"
            tag="v${version}"
            version_bumped="true"
          done

          if [ "$version_bumped" = "true" ]; then
            printf '%s\n' "$version" > VERSION
            echo "Published release already existed; bumped VERSION to $version for this release."
          fi

          {
            echo "version=$version"
            echo "tag=$tag"
            echo "version_bumped=$version_bumped"
          } >> "$GITHUB_OUTPUT"

      - name: Persist bumped VERSION before tagging
        if: ${{ steps.version.outputs.version_bumped == 'true' }}
        env:
          RELEASE_REF: ${{ github.event.pull_request.base.ref || github.ref_name }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          printf '%s\n' "$RELEASE_VERSION" > VERSION
          git add VERSION

          if git diff --cached --quiet; then
            echo "No VERSION change to commit"
            exit 0
          fi

          git commit -m "chore: bump version to ${RELEASE_VERSION} [skip ci]"
          git push origin "HEAD:${RELEASE_REF}"

      - name: Create tag
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag -a "$TAG" -m "$TAG"
            git push origin "$TAG"
          fi

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6.2.1
        with:
          commitMode: true
          configuration: ".github/changelog_config.json"

      - name: Build release archives
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/release-artifacts.sh build --version "$VERSION" --dist-dir dist

      - name: Validate Linux release binaries are statically linked
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: bash scripts/release-artifacts.sh verify-linux-static --version "$VERSION" --dist-dir dist

      - name: Capture release artifact name
        id: artifact
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: echo "name=release-assets-${TAG}" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: dist/*
          if-no-files-found: error

  verify_release_manifest:
    needs: prepare_release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.prepare_release.outputs.artifact_name }}
          path: dist

      - name: Verify release checksums
        run: bash scripts/release-artifacts.sh verify-manifest --dist-dir dist

  smoke_release_assets:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            goos: linux
            goarch: amd64
            archive_ext: tar.gz
            binary_ext: ""
          # GitHub does not currently provide an ubuntu-latest arm64 alias.
          - runs_on: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - runs_on: macos-latest
            goos: darwin
            goarch: arm64
            archive_ext: tar.gz
            binary_ext: ""
          - runs_on: windows-latest
            goos: windows
            goarch: amd64
            archive_ext: zip
            binary_ext: .exe
          # GitHub does not currently provide a windows-latest arm64 alias.
          - runs_on: windows-11-arm
            goos: windows
            goarch: arm64
            archive_ext: zip
            binary_ext: .exe
    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.prepare_release.outputs.artifact_name }}
          path: dist

      - name: Smoke test packaged binary
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          ARCHIVE_EXT: ${{ matrix.archive_ext }}
          BINARY_EXT: ${{ matrix.binary_ext }}
        run: |
          args=(
            smoke-test
            --version "$VERSION"
            --goos "$GOOS"
            --goarch "$GOARCH"
            --archive-ext "$ARCHIVE_EXT"
            --dist-dir dist
          )
          if [[ -n "$BINARY_EXT" ]]; then
            args+=(--binary-ext "$BINARY_EXT")
          fi
          bash scripts/release-artifacts.sh "${args[@]}"

      - name: Smoke test Windows installer
        if: ${{ matrix.goos == 'windows' }}
        env:
          VERSION: ${{ needs.prepare_release.outputs.version }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          bash scripts/release-artifacts.sh smoke-windows-installer \
            --version "$VERSION" \
            --goarch "$GOARCH" \
            --dist-dir dist

  publish_release:
    needs:
      - prepare_release
      - verify_release_manifest
      - smoke_release_assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ needs.prepare_release.outputs.artifact_name }}
          path: dist

      - name: Create or update release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          name: ${{ needs.prepare_release.outputs.tag }}
          draft: false
          body: ${{ needs.prepare_release.outputs.changelog }}
          files: dist/*

  build_desktop:
    needs: prepare_release
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-26 is Apple Silicon (arm64) with Xcode 26 — required for the
          # liquid-glass icon's actool compile and the aarch64-apple-darwin target.
          # Pinned (not macos-latest) while GitHub migrates the latest label to
          # macOS 26 (June 15 - July 15, 2026). Revisit ~2026-07-22: respawn-llc/kent#407.
          - runs_on: macos-26
            platform: macos
          - runs_on: ubuntu-22.04
            platform: linux
    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Linux bundling dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libfuse2 file build-essential

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Build desktop bundles
        env:
          KENT_VERSION: ${{ needs.prepare_release.outputs.version }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS Developer ID signing. tauri build imports APPLE_CERTIFICATE into an
          # ephemeral keychain and signs with APPLE_SIGNING_IDENTITY. Notarization is
          # OFF for v1, so the APPLE_API_* notarization keys are intentionally NOT
          # exported here (flip them on later to enable notarization).
          APPLE_CERTIFICATE: ${{ matrix.platform == 'macos' && secrets.APPLE_CERTIFICATE || '' }}
          APPLE_CERTIFICATE_PASSWORD: ${{ matrix.platform == 'macos' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_SIGNING_IDENTITY: ${{ matrix.platform == 'macos' && secrets.APPLE_SIGNING_IDENTITY || '' }}
        run: bash scripts/desktop-release.sh build --version "$KENT_VERSION" --dist-dir dist/desktop

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: desktop-assets-${{ matrix.platform }}-${{ needs.prepare_release.outputs.tag }}
          path: dist/desktop/*
          if-no-files-found: error

  publish_desktop:
    needs:
      - prepare_release
      - publish_release
      - build_desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2

      # Both platforms' staged bundles merge into one dist dir so assemble sees all
      # updater .sig files and emits a single latest.json covering both platforms.
      - name: Download macOS desktop artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: desktop-assets-macos-${{ needs.prepare_release.outputs.tag }}
          path: dist/desktop

      - name: Download Linux desktop artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          name: desktop-assets-linux-${{ needs.prepare_release.outputs.tag }}
          path: dist/desktop

      - name: Assemble updater manifest + checksums
        env:
          KENT_VERSION: ${{ needs.prepare_release.outputs.version }}
          TAG: ${{ needs.prepare_release.outputs.tag }}
        run: |
          bash scripts/desktop-release.sh assemble \
            --version "$KENT_VERSION" \
            --dist-dir dist/desktop \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${TAG}"

      - name: Upload desktop assets to release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ needs.prepare_release.outputs.tag }}
          files: dist/desktop/*

  update_brew_tap:
    needs:
      - prepare_release
      - publish_release
      - publish_desktop
    runs-on: ubuntu-latest
    env:
      BREW_FORMULA_NAME: kent
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/checkout@v6.0.2
        with:
          repository: respawn-llc/homebrew-tap
          path: homebrew-tap
          token: ${{ secrets.RESPAWN_BREW_TAP_TOKEN }}

      - name: Configure git
        run: |
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "github-actions[bot]@users.noreply.github.com"

      # The desktop .dmg is published by publish_desktop (a dependency of this job),
      # so its release asset URL resolves and update-brew-tap.sh regenerates the
      # kent-desktop cask alongside the formula.
      - name: Update tap formula and cask
        env:
          KENT_VERSION: ${{ needs.prepare_release.outputs.tag }}
          DESKTOP_DMG_URL: https://github.com/${{ github.repository }}/releases/download/${{ needs.prepare_release.outputs.tag }}/Kent_${{ needs.prepare_release.outputs.version }}_aarch64.dmg
        run: |
          bash scripts/update-brew-tap.sh \
            --tap "$GITHUB_WORKSPACE/homebrew-tap" \
            --formula "$BREW_FORMULA_NAME" \
            --desktop-url "$DESKTOP_DMG_URL"

      - name: Ensure pr-pull label exists
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.RESPAWN_BREW_TAP_TOKEN }}
          script: |
            const owner = "respawn-llc";
            const repo = "homebrew-tap";
            const name = "pr-pull";
            try {
              await github.rest.issues.getLabel({ owner, repo, name });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner,
                repo,
                name,
                color: "0e8a16",
                description: "Ready for brew pr-pull",
              });
            }

      - name: Create tap PR
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ secrets.RESPAWN_BREW_TAP_TOKEN }}
          path: homebrew-tap
          base: master
          branch: chore/${{ env.BREW_FORMULA_NAME }}-${{ needs.prepare_release.outputs.tag }}
          commit-message: "${{ env.BREW_FORMULA_NAME }} ${{ needs.prepare_release.outputs.tag }}"
          title: "${{ env.BREW_FORMULA_NAME }} ${{ needs.prepare_release.outputs.tag }}"
          body: "Automated formula bump for ${{ env.BREW_FORMULA_NAME }} ${{ needs.prepare_release.outputs.tag }}."
          labels: pr-pull
