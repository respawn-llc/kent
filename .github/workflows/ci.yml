name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: ./scripts/ci-check.sh format

      - name: Run vet
        run: ./scripts/ci-check.sh vet

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Build
        run: ./scripts/ci-check.sh build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Test
        env:
          KENT_TEST_DISABLE_WALL_CLOCK_CAP: "1"
        run: ./scripts/ci-check.sh test

  windows-installer:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Build mocked Windows release asset
        env:
          VERSION: 0.0.0
        run: |
          mkdir -p dist staging
          GOOS=windows GOARCH=amd64 KENT_VERSION="$VERSION" \
            bash scripts/build.sh --output "staging/kent_${VERSION}_windows_amd64.exe"
          powershell -NoProfile -Command "Compress-Archive -LiteralPath 'staging/kent_${VERSION}_windows_amd64.exe' -DestinationPath 'dist/kent_${VERSION}_windows_amd64.zip' -Force"
          checksum=$(powershell -NoProfile -Command "(Get-FileHash -Algorithm SHA256 -LiteralPath 'dist/kent_${VERSION}_windows_amd64.zip').Hash.ToLowerInvariant()")
          printf '%s  %s\n' "$checksum" "kent_${VERSION}_windows_amd64.zip" > dist/checksums.txt

      - name: Smoke test installer
        env:
          VERSION: 0.0.0
        run: bash scripts/release-artifacts.sh smoke-windows-installer --version "$VERSION" --goarch amd64 --dist-dir dist

      - name: Smoke test installer restores stopped service after failure
        env:
          VERSION: 0.0.0
        run: |
          cat > fake-kent.go <<'GO'
          package main
          import (
            "fmt"
            "os"
            "strings"
          )
          func mark(value string) {
            path := os.Getenv("KENT_FAKE_MARKER")
            if path == "" { return }
            f, err := os.OpenFile(path, os.O_CREATE|os.O_APPEND|os.O_WRONLY, 0644)
            if err == nil { _, _ = f.WriteString(value + "\n"); _ = f.Close() }
          }
          func main() {
            args := os.Args[1:]
            if len(args) == 1 && args[0] == "--version" { fmt.Println(os.Getenv("KENT_FAKE_VERSION")); return }
            if len(args) >= 2 && args[0] == "service" && args[1] == "status" {
              exe, _ := os.Executable()
              fmt.Printf(`{"installed":true,"loaded":true,"running":true,"command":[%q],"endpoint":"","logs":[]}`+"\n", exe)
              return
            }
            if len(args) >= 2 && args[0] == "service" && args[1] == "stop" { mark("stopped"); return }
            if len(args) >= 3 && strings.Join(args[:3], " ") == "service restart --if-installed" { mark("restarted"); return }
            fmt.Fprintf(os.Stderr, "unexpected args: %v\n", args)
            os.Exit(1)
          }
          GO
          mkdir -p "recovery-release/v${VERSION}" "recovery-install" "recovery-staging"
          GOOS=windows GOARCH=amd64 go build -o recovery-install/kent.exe fake-kent.go
          cp recovery-install/kent.exe "recovery-staging/kent_${VERSION}_windows_amd64.exe"
          powershell -NoProfile -Command "Compress-Archive -LiteralPath 'recovery-staging/kent_${VERSION}_windows_amd64.exe' -DestinationPath 'recovery-release/v${VERSION}/kent_${VERSION}_windows_amd64.zip' -Force"
          checksum=$(powershell -NoProfile -Command "(Get-FileHash -Algorithm SHA256 -LiteralPath 'recovery-release/v${VERSION}/kent_${VERSION}_windows_amd64.zip').Hash.ToLowerInvariant()")
          printf '%s  %s\n' "$checksum" "kent_${VERSION}_windows_amd64.zip" > "recovery-release/v${VERSION}/checksums.txt"
          release_base="$(cygpath -w "$PWD/recovery-release")"
          install_dir="$(cygpath -w "$PWD/recovery-install")"
          marker_path="$PWD/recovery-marker.txt"
          marker_win="$(cygpath -w "$marker_path")"
          if KENT_RELEASE_BASE="$release_base" KENT_FAKE_MARKER="$marker_win" KENT_FAKE_VERSION="wrong" \
            powershell -NoProfile -ExecutionPolicy Bypass -File scripts/install.ps1 \
              -Version "$VERSION" -InstallDir "$install_dir" -Yes -NoPath -NoDeps; then
            echo "installer unexpectedly succeeded" >&2
            exit 1
          fi
          grep -q '^stopped$' "$marker_path"
          grep -q '^restarted$' "$marker_path"

  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: docs
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install docs dependencies
        run: pnpm install --frozen-lockfile

      - name: Test docs
        run: pnpm test

      - name: Build docs
        run: pnpm build

  gui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Check GUI dependency policy
        working-directory: apps
        run: node scripts/check-dependency-policy.mjs

      - name: Install GUI dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint GUI
        run: pnpm lint

      - name: Typecheck GUI
        run: pnpm typecheck

      - name: Test GUI
        run: pnpm test

      - name: Build GUI web assets
        run: pnpm build

  gui-native:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Check Tauri native shell
        run: cargo check --locked

  desktop_bundle:
    # Catch desktop packaging breakage (bundling, AppImage/deb generation, updater
    # artifact signing) on PRs — gui-native only cargo-checks the Rust shell. Linux
    # only: it is the cheap runner and the most common packaging break; the macOS
    # .dmg/glass-icon path is validated by the release job + first-bundle manual QA.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Linux bundling dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libfuse2 file build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/pnpm-lock.yaml

      - name: Install GUI dependencies
        run: pnpm --dir apps install --frozen-lockfile

      # build-desktop.sh signs updater artifacts (createUpdaterArtifacts is on). PRs
      # (incl. forks) have no secret, so mint a throwaway key and pass it by content.
      # The signer runs under pnpm --dir apps/desktop, so the key path must be
      # absolute ($RUNNER_TEMP); the signed debug artifacts are discarded.
      - name: Build desktop bundle (unsigned, debug)
        run: |
          pnpm --dir apps/desktop exec tauri signer generate -f -w "$RUNNER_TEMP/ci-updater.key" -p ""
          TAURI_SIGNING_PRIVATE_KEY="$(cat "$RUNNER_TEMP/ci-updater.key")"
          export TAURI_SIGNING_PRIVATE_KEY
          export TAURI_SIGNING_PRIVATE_KEY_PASSWORD=""
          bash scripts/build-desktop.sh --skip-install -- --debug
