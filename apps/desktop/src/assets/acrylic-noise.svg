<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <filter id="acrylic-noise" x="0" y="0" width="100%" height="100%" color-interpolation-filters="sRGB">
    <feTurbulence type="fractalNoise" baseFrequency="0.42" numOctaves="5" stitchTiles="stitch" />
    <feColorMatrix type="saturate" values="0" />
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.82" intercept="0.09" />
      <feFuncG type="linear" slope="0.82" intercept="0.09" />
      <feFuncB type="linear" slope="0.82" intercept="0.09" />
      <feFuncA type="linear" slope="1" />
    </feComponentTransfer>
  </filter>
  <rect width="512" height="512" filter="url(#acrylic-noise)" />
</svg>
