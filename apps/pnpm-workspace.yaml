packages:
  - "desktop"
  - "desktop/packages/*"
  - "shared/*"

# 7 days. Keeps freshly published packages out of local installs/updates.
minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  # Approved bootstrap exception: @types/node 25.8.0 was accepted explicitly.
  - "@types/node"
  # Approved bootstrap exception: Vite 8.0.13 is part of the initial latest-deps scaffold.
  - "vite"
  # Vite 8 resolves Rolldown platform bindings as transitive toolchain packages.
  - "@rolldown/*"

# No frontend dependency may run install/build lifecycle scripts unless explicitly reviewed here.
onlyBuiltDependencies: []
